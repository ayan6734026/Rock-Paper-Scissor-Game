<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="/RPS.css">
</head>
<body>
<header class="head">
    <h1 id="heading_txt">Rock Paper Scissor Game</h1>
</header>

<section class="icons" >
    <div class="icons_div" id="rock" ><img class="icons_img"  alt="Rock" src="/All Assets/rock_sign.jpeg"></div>
    <div class="icons_div" id="paper"><img class="icons_img"  alt="Paper" src="/All Assets/paper_sign.jpeg"></div>
    <div class="icons_div" id="scissor"><img class="icons_img"  alt="Scissor" src="/All Assets/scissor_sign.jpeg"></div>
</section>


<section class="scores">
    <div class="scores_div" id="user_sec">
        <p class="scores">0</p>
        <p id="user_txt">User</p>
    </div>
    <div class="scores_div" id="comp_sec">
        <p class="scores">0</p>
        <p id="comp_txt">Comp</p>
    </div>
</section>

<section class="info_text">
<p id="text">Play your move</p>
</section>

<footer>
    <h3 id="footer_txt">𝕸𝖆𝖉𝖊 𝕭𝖞 𝕬𝖞𝖆𝖓 𝕾𝖆𝖒𝖆𝖓𝖙𝖆</h3>
</footer>
    
<script src="/RPS.js"></script>
</body>
</html>
